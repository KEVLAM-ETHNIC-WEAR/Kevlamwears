<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevalam Ethnic Wear | Premium Menswear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-deep: #0a0e1a;
            --navy-royal: #151b3d;
            --navy-light: #1e2749;
            --gold: #d4af37;
            --gold-soft: #c5a059;
            --cream: #f5f3ef;
            --text-light: #e8e6e1;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--navy-deep);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--navy-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            background: transparent;
        }

        nav.scrolled {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 700;
            position: relative;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 55px;
            height: 55px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            transform: rotate(45deg);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text span:first-child {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 2px;
            line-height: 1;
        }

        .logo-text span:last-child {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 5px;
            transition: color 0.3s;
            font-weight: 400;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .mobile-menu-btn span {
            display: block;
            width: 25px;
            height: 1.5px;
            background: var(--gold);
            margin: 6px 0;
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: radial-gradient(circle at center, var(--navy-light) 0%, var(--navy-deep) 70%);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 0 2rem;
        }

        .hero-subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-soft);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.3s;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--cream);
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.5s;
        }

        .hero h1 em {
            color: var(--gold);
            font-style: italic;
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2.5rem;
            font-weight: 300;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.7s;
        }

        .hero-cta {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.9s;
        }

        .btn {
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-primary:hover {
            background: var(--gold);
            color: var(--navy-deep);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(245, 243, 239, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--text-light);
            background: rgba(245, 243, 239, 0.05);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(30px);
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        .scroll-indicator span {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--gold), transparent);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Section Styles */
        section {
            padding: 6rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--cream);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 1rem auto 0;
        }

        .section-header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* About Us */
        .about-us {
            background: var(--navy-deep);
            position: relative;
        }

        .about-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .about-intro {
            text-align: center;
            margin-bottom: 5rem;
        }

        .about-lead {
            font-size: 1.4rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .about-intro p {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .why-choose {
            margin-top: 4rem;
        }

        .why-choose h3 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .feature-card {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: var(--navy-royal);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.4s ease;
            position: relative;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .feature-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
            background: rgba(30, 39, 73, 0.8);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--gold);
            border-radius: 50%;
            color: var(--gold);
            transition: all 0.4s ease;
        }

        .feature-card:hover .feature-icon {
            background: var(--gold);
            color: var(--navy-deep);
            transform: rotate(360deg);
        }

        .feature-icon svg {
            width: 28px;
            height: 28px;
        }

        .feature-card h4 {
            font-size: 1.3rem;
            color: var(--cream);
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .feature-card p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 0.95rem;
            font-weight: 300;
        }

        .about-cta {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-royal) 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
            margin-top: 3rem;
        }

        .about-cta::before,
        .about-cta::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold);
        }

        .about-cta::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }

        .about-cta::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }

        .cta-text {
            font-size: 1.3rem;
            color: var(--text-light);
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* Philosophy */
        .philosophy {
            background: var(--navy-royal);
            position: relative;
        }

        .philosophy::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            opacity: 0.3;
        }

        .philosophy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .philosophy-text h3 {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .philosophy-text p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .philosophy-image {
            position: relative;
            height: 500px;
            background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-deep) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        .philosophy-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: transform 0.6s ease;
        }

        .philosophy-image:hover img {
            transform: scale(1.05);
        }

        .philosophy-image::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin: 1rem;
            pointer-events: none;
        }

        /* Collections */
        .collections-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .collection-card {
            position: relative;
            height: 500px;
            overflow: hidden;
            cursor: pointer;
            background: var(--navy-royal);
            border: 1px solid rgba(212, 175, 55, 0.08);
            transition: all 0.4s ease;
        }

        .collection-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
        }

        .collection-card img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            transition: transform 0.6s ease;
            opacity: 0.9;
        }

        .collection-card:hover img {
            transform: scale(1.1);
            opacity: 1;
        }

        .collection-info {
            padding: 1.5rem;
            text-align: center;
            height: 30%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--navy-royal);
        }

        .collection-info h3 {
            color: var(--cream);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .collection-info p {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
        }

        /* For Grooms */
        .grooms {
            background: linear-gradient(to bottom, var(--navy-deep), var(--navy-royal));
            position: relative;
            overflow: hidden;
        }

        .grooms::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(212,175,55,0.1)"/></svg>');
            background-size: 50px 50px;
            opacity: 0.5;
            pointer-events: none;
        }

        .grooms-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .grooms-image {
            height: 600px;
            position: relative;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .grooms-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grooms-image::before {
            content: '';
            position: absolute;
            inset: -1rem;
            border: 1px solid rgba(212, 175, 55, 0.1);
            z-index: -1;
        }

        .grooms-text h2 {
            font-size: 2.5rem;
            color: var(--cream);
            margin-bottom: 1.5rem;
        }

        .grooms-text h2 span {
            color: var(--gold);
        }

        .grooms-text p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .feature-list {
            list-style: none;
            margin-bottom: 2rem;
        }

        .feature-list li {
            padding: 0.8rem 0;
            color: var(--text-light);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 300;
        }

        .feature-list li::before {
            content: '—';
            color: var(--gold);
        }

        /* Wholesale */
        .wholesale {
            text-align: center;
            background: var(--navy-royal);
            position: relative;
        }

        .wholesale-box {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem;
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
        }

        .wholesale-box::before,
        .wholesale-box::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid var(--gold);
        }
